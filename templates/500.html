<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - Fake News Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .error-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        .error-code {
            font-size: 72px;
            font-weight: bold;
            color: #dc2626;
            margin-bottom: 10px;
        }
        
        .error-title {
            font-size: 24px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 15px;
        }
        
        .error-message {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 30px;
        }
        
        .error-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .error-btn {
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .error-btn-primary {
            background: #667eea;
            color: white;
        }
        
        .error-btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .error-btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }
        
        .error-btn-secondary:hover {
            background: #d1d5db;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-card">
            <div class="error-code">500</div>
            <div class="error-title">Internal Server Error</div>
            <div class="error-message">
                We're sorry, but something went wrong on our end. 
                The server encountered an unexpected condition and couldn't complete your request.
            </div>
            <div class="error-actions">
                <a href="{{ url_for('home') }}" class="error-btn error-btn-primary">Go Home</a>
                <a href="javascript:history.back()" class="error-btn error-btn-secondary">Go Back</a>
            </div>
        </div>
    </div>
</body>
</html>
