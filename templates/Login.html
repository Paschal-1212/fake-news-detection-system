<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fake News Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-box {
            background: white;
            border-radius: 16px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-box h2 {
            text-align: center;
            color: #0f172a;
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .login-subtitle {
            text-align: center;
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #0f172a;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #f8fafc;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        input::placeholder {
            color: #94a3b8;
        }
        
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .login-links {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .login-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        
        .login-links a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .alert-box {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            border-left: 4px solid;
        }
        
        .alert-error {
            background-color: #fee2e2;
            color: #991b1b;
            border-left-color: #dc2626;
        }
        
        .alert-success {
            background-color: #dcfce7;
            color: #065f46;
            border-left-color: #16a34a;
        }
        
        .divider {
            text-align: center;
            color: #cbd5e1;
            margin: 20px 0;
            font-size: 0.9rem;
        }
        
        @media (max-width: 480px) {
            .login-box {
                padding: 30px 20px;
            }
            
            .login-box h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <main class="login-container">
        <div class="login-box">

            <h2>🔐 Login</h2>
            <p class="login-subtitle">Sign in to your Account</p>

            {% if message %}
            <div class="alert-box {% if message_type == 'error' %}alert-error{% else %}alert-success{% endif %}">
                {{ message }}
            </div>
            {% endif %}

            <form action="{{ url_for('login') }}" method="POST">

                <div class="form-group">
                    <label for="username">👤 Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter your username" 
                        autocomplete="username" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">🔑 Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••" 
                        autocomplete="current-password" 
                        required
                    >
                </div>

                <button type="submit" class="btn-primary">✓ Sign In</button>
            </form>

            <div class="divider">OR</div>

            <div class="login-links">
                <a href="{{ url_for('reset_password') }}">💭 Forgot Password?</a>
                <a href="{{ url_for('register') }}">📝 Create New Account</a>
                <a href="{{ url_for('home') }}">← Back to Home</a>
            </div>

        </div>
    </main>

</body>
</html>
