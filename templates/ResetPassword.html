<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    background:white;
    padding:40px;
    border-radius:15px;
    width:100%;
    max-width:450px;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#0f172a;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#64748b;
    margin-bottom:25px;
    font-size:14px;
}

.form-group{
    margin-bottom:18px;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #e2e8f0;
    border-radius:8px;
    font-size:15px;
    transition:0.3s;
}

input:focus{
    outline:none;
    border-color:#667eea;
    box-shadow:0 0 0 3px rgba(102,126,234,.15);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    font-weight:bold;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

.alert{
    padding:12px;
    border-radius:8px;
    margin-bottom:20px;
    font-weight:600;
}

.error{
    background:#fee2e2;
    color:#991b1b;
}

.success{
    background:#dcfce7;
    color:#065f46;
}

.back-link{
    text-align:center;
    margin-top:20px;
}

.back-link a{
    text-decoration:none;
    color:#667eea;
    font-weight:600;
}

.back-link a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

    <h2>🔑 Reset Password</h2>
    <p class="subtitle">
        Enter your account information and create a new password
    </p>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert {% if category == 'error' %}error{% else %}success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

    <form method="POST">

        <div class="form-group">
            <input
                type="text"
                name="username"
                placeholder="Username or Email"
                required
            >
        </div>

        <div class="form-group">
            <input
                type="password"
                name="new_password"
                placeholder="New Password"
                required
            >
        </div>

        <div class="form-group">
            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm Password"
                required
            >
        </div>

        <button type="submit">
            🔄 Reset Password
        </button>

    </form>

    <div class="back-link">
        <a href="{{ url_for('login') }}">
            ← Back to Login
        </a>
    </div>

</div>

</body>
</html>
